<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Browser — Drive Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a{text-decoration:none;color:inherit}
button{font-family:inherit}

:root{
  --bg:#F5F7F7;
  --surface:#FFFFFF;
  --accent:#0ABAB5;
  --accent-soft:#81D8D0;
  --accent-ink:#06756f;
  --ink:#1F2328;
  --ink-dim:#6B7177;
  --line:#E3E7E8;
  --danger:#c0392b;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);
  --eout:cubic-bezier(0.16,1,0.3,1);
}

html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;cursor:none;overflow-x:hidden;font-size:14px;-webkit-font-smoothing:antialiased}
@media(pointer:coarse){body{cursor:auto}#cur{display:none!important}}

/* ── Cursor ── */
#cur{position:fixed;top:0;left:0;width:8px;height:8px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;will-change:transform;transition:width .18s,height .18s,background .18s}
#cur.big{width:30px;height:30px;background:rgba(10,186,181,.16);border:1px solid var(--accent)}

/* ── Nav ── */
nav{position:sticky;top:0;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:var(--surface);border-bottom:1px solid var(--line)}
.nav-logo{font-size:1.05rem;font-weight:700;letter-spacing:.01em;color:var(--ink)}
.nav-r{display:flex;align-items:center;gap:18px}
.nav-r a{font-size:.78rem;color:var(--ink-dim);transition:color .15s}
.nav-r a:hover{color:var(--accent-ink)}
.nav-out{font-size:.76rem;color:var(--ink-dim);background:none;border:1px solid var(--line);border-radius:8px;padding:7px 14px;cursor:none;transition:all .15s}
.nav-out:hover{color:var(--ink);border-color:var(--ink-dim)}

/* ── Breadcrumb ── */
.bc-bar{padding:14px 32px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:var(--surface)}
.crumb{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink-dim);cursor:none;transition:color .15s}
.crumb:hover{color:var(--accent-ink)}
.crumb-sep{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--line)}
.crumb-cur{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink)}

/* ── Layout ── */
main{max-width:1400px;margin:0 auto;padding:32px 32px 80px}

/* ── Section headers ── */
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:20px}
.sec-title{font-size:1.15rem;font-weight:700;color:var(--ink)}
.sec-meta{font-size:.7rem;color:var(--ink-dim)}

/* ── Folders ── */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:48px}
.folder-card{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:16px 16px;cursor:none;transition:all .15s;display:flex;align-items:center;gap:11px}
.folder-card:hover{border-color:var(--accent);box-shadow:0 6px 18px rgba(10,186,181,.10);transform:translateY(-2px)}
.folder-icon{flex-shrink:0;display:flex;color:var(--accent)}
.folder-icon svg{width:24px;height:24px}
.folder-name{font-size:.9rem;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.no-folders{font-size:.74rem;color:var(--ink-dim);padding:16px 2px}

/* ── Gallery ── */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.gallery-card{background:var(--surface);border:1px solid var(--line);border-radius:13px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:all .15s}
.gallery-card:hover{border-color:var(--accent);box-shadow:0 6px 18px rgba(10,186,181,.10)}

.g-thumb{aspect-ratio:3/4;overflow:hidden;background:var(--bg);position:relative;display:flex;align-items:center;justify-content:center;cursor:none}
.g-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s var(--ease),opacity .3s}
.g-thumb img.loading{opacity:0}
.g-thumb img.loaded{opacity:1}
.gallery-card:hover .g-thumb img{transform:scale(1.04)}
.g-icon{font-size:2.4rem;color:var(--ink-dim);user-select:none}

.play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(31,35,40,.3);opacity:0;transition:opacity .2s;pointer-events:none}
.play-ring{width:44px;height:44px;border:1.5px solid rgba(255,255,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#fff;padding-left:3px}
.g-thumb:hover .play-ov{opacity:1}

.g-info{padding:11px 13px 6px}
.g-name{font-size:.82rem;font-weight:500;color:var(--ink);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.g-meta{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--ink-dim)}

.g-actions{padding:7px 11px 11px;display:flex;gap:4px;flex-wrap:wrap;opacity:0;transition:opacity .2s}
.gallery-card:hover .g-actions{opacity:1}
.act{font-size:.6rem;padding:4px 9px;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--ink-dim);cursor:none;transition:all .15s;white-space:nowrap;display:inline-block;font-family:'Inter',sans-serif}
.act:hover{border-color:var(--accent);color:var(--ink)}
.act.danger:hover{border-color:var(--danger);color:var(--danger)}
.act:disabled{opacity:.3;cursor:not-allowed}

.rename-inp{background:var(--surface);border:none;border-bottom:1.5px solid var(--accent);color:var(--ink);font-family:'Inter',sans-serif;font-size:.82rem;width:100%;outline:none;padding:1px 0}

/* ── Empty / Loading ── */
.empty-msg,.load-msg{font-size:.78rem;color:var(--ink-dim);padding:48px;text-align:center;display:flex;align-items:center;justify-content:center;gap:9px}
.spinner{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Preview modal ── */
#previewOverlay{display:none;position:fixed;inset:0;background:rgba(31,35,40,.82);z-index:3000;align-items:center;justify-content:center}
#previewOverlay.open{display:flex}
.preview-box{background:var(--surface);border-radius:15px;max-width:93vw;max-height:93vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.4)}
.preview-hd{padding:13px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
.preview-title{font-size:.8rem;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60vw}
.preview-x{background:none;border:none;font-size:.74rem;color:var(--ink-dim);cursor:none}
.preview-x:hover{color:var(--ink)}
.preview-body{display:flex;align-items:center;justify-content:center;overflow:auto;flex:1;padding:16px;min-width:280px;min-height:180px}
.preview-body img{max-width:84vw;max-height:76vh;display:block}
.preview-body iframe{border:none;width:74vw;height:58vh}
.preview-ft{padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}

/* ── Move modal ── */
#moveOverlay{display:none;position:fixed;inset:0;background:rgba(31,35,40,.45);z-index:4000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
#moveOverlay.open{display:flex}
.move-box{background:var(--surface);border-radius:15px;width:430px;max-width:95vw;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 30px 70px rgba(0,0,0,.28);overflow:hidden}
.move-hd{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.move-title-txt{font-size:.98rem;font-weight:700}
.move-x{background:none;border:none;font-size:.74rem;color:var(--ink-dim);cursor:none}
.move-x:hover{color:var(--ink)}
.move-bc{padding:9px 20px;background:var(--bg);font-family:'DM Mono',monospace;font-size:.66rem;color:var(--ink-dim);border-bottom:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.move-bc span{cursor:pointer;transition:color .12s}
.move-bc span:hover{color:var(--accent-ink)}
.move-body{overflow-y:auto;flex:1;padding:6px}
.move-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:none;transition:background .12s}
.move-item:hover{background:var(--bg)}
.move-item-name{flex:1;font-size:.85rem;display:flex;align-items:center;gap:9px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.move-item-name svg{width:18px;height:18px;flex-shrink:0;color:var(--accent)}
.move-item-arr{display:flex;flex-shrink:0;color:var(--ink-dim)}
.move-item-arr svg{width:16px;height:16px}
.move-item:hover .move-item-arr{color:var(--accent)}
.move-empty{font-size:.74rem;color:var(--ink-dim);padding:24px;text-align:center;display:flex;align-items:center;justify-content:center;gap:9px}
.move-ft{padding:13px 20px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
.move-cur{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--ink-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.move-confirm-btn{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:.76rem;font-weight:600;cursor:none}
.move-confirm-btn:hover{background:var(--accent-ink)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;font-size:.8rem;font-weight:500;padding:12px 20px;border-radius:10px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.14)}
#toast.show{opacity:1}
#toast.ok{background:#fff;border:1px solid #b6e3c6;color:#2e9e5b}
#toast.err{background:#fff;border:1px solid #f0c2bd;color:var(--danger)}

/* ── Responsive ── */
@media(max-width:767px){
  nav{padding:13px 18px}
  .bc-bar{padding:12px 18px}
  main{padding:24px 18px 60px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  #cur{display:none!important}body{cursor:auto!important}
}
</style>
</head>
<body>

<div id="cur"></div>

<nav>
  <span class="nav-logo">Drive Archive</span>
  <div class="nav-r">
    <a href="/">← Dashboard</a>
    <a href="/logout" class="nav-out">Sign out</a>
  </div>
</nav>

<div class="bc-bar" id="breadcrumb"></div>

<main>
  <!-- Folders -->
  <div id="foldersSection">
    <div class="sec-hd">
      <h2 class="sec-title">Folders</h2>
      <span class="sec-meta" id="folderCount"></span>
    </div>
    <div class="folder-grid" id="folderGrid"><div class="load-msg"><span class="spinner"></span>Loading…</div></div>
  </div>

  <!-- Files -->
  <div id="filesSection">
    <div class="sec-hd">
      <h2 class="sec-title">Files</h2>
      <span class="sec-meta" id="fileCount"></span>
    </div>
    <div class="gallery-grid" id="galleryGrid"><div class="load-msg" style="grid-column:1/-1"><span class="spinner"></span>Loading…</div></div>
  </div>
</main>

<!-- Preview -->
<div id="previewOverlay" onclick="if(event.target===this)closePreview()">
  <div class="preview-box">
    <div class="preview-hd">
      <span class="preview-title" id="previewTitle"></span>
      <button class="preview-x" onclick="closePreview()">Close ✕</button>
    </div>
    <div class="preview-body" id="previewBody"></div>
    <div class="preview-ft" id="previewFt"></div>
  </div>
</div>

<!-- Move -->
<div id="moveOverlay" onclick="if(event.target===this)closeMoveModal()">
  <div class="move-box">
    <div class="move-hd">
      <span class="move-title-txt">Move to folder</span>
      <button class="move-x" onclick="closeMoveModal()">Close ✕</button>
    </div>
    <div class="move-bc" id="moveBc"></div>
    <div class="move-body" id="moveBody"></div>
    <div class="move-ft">
      <span class="move-cur" id="moveCur"></span>
      <button class="move-confirm-btn" onclick="confirmMove()">Move here</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ─── Cursor ─── */
const cur=document.getElementById('cur');
let mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function tick(){cx+=(mx-cx)*.35;cy+=(my-cy)*.35;cur.style.transform=`translate(${cx-cur.offsetWidth/2}px,${cy-cur.offsetHeight/2}px)`;requestAnimationFrame(tick)})();
const HOVER_SEL='a,button,.folder-card,.gallery-card,.g-thumb,.move-item,.act';
document.addEventListener('mouseover',e=>{if(e.target.closest(HOVER_SEL))cur.classList.add('big')});
document.addEventListener('mouseout', e=>{if(e.target.closest(HOVER_SEL))cur.classList.remove('big')});

/* ─── Icons ─── */
const FOLDER_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
const CHEV_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';

/* ─── State ─── */
let stack=[{id:'root',name:'My Drive'}];
let moveStack=[{id:'root',name:'My Drive'}];
let movingFile=null;

const IMG=/\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i;
const VID=/\.(mp4|webm|mov|m4v|avi|mkv)$/i;

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtBytes(b){b=parseInt(b||0);if(b>=1073741824)return(b/1073741824).toFixed(2)+' GB';if(b>=1048576)return(b/1048576).toFixed(1)+' MB';if(b>=1024)return(b/1024).toFixed(1)+' KB';return b?b+' B':'—'}
function showToast(msg,ok){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+(ok?'ok':'err');setTimeout(()=>t.className='',3200)}
function currentId(){return stack[stack.length-1].id}

/* ─── Load folder ─── */
async function load(parentId){
  document.getElementById('folderGrid').innerHTML='<div class="load-msg"><span class="spinner"></span>Loading…</div>';
  document.getElementById('galleryGrid').innerHTML='<div class="load-msg" style="grid-column:1/-1"><span class="spinner"></span>Loading…</div>';
  renderBreadcrumb();

  if(parentId==='root'){
    const p=new URLSearchParams(location.search).get('folder');
    if(p){stack=[{id:'root',name:'My Drive'},{id:p,name:'…'}];parentId=p;renderBreadcrumb()}
  }

  const res=await fetch('/api/browser?parent='+parentId);
  const d=await res.json();
  if(!d.ok){showToast(d.error||'Failed to load',false);return}

  if(stack[stack.length-1].name==='…'&&d.current_name){
    stack[stack.length-1].name=d.current_name;renderBreadcrumb();
  }

  renderFolders(d.folders);
  renderGallery(d.files,parentId);
}

/* ─── Breadcrumb ─── */
function renderBreadcrumb(){
  document.getElementById('breadcrumb').innerHTML=stack.map((f,i)=>
    i===stack.length-1
      ?`<span class="crumb-cur">${escH(f.name)}</span>`
      :`<span class="crumb" onclick="navTo(${i})">${escH(f.name)}</span><span class="crumb-sep">›</span>`
  ).join('');
}
function navTo(i){stack=stack.slice(0,i+1);load(currentId())}

/* ─── Folders ─── */
function renderFolders(folders){
  const g=document.getElementById('folderGrid');
  document.getElementById('folderCount').textContent=folders.length?folders.length+' folder'+(folders.length>1?'s':''):'';
  if(!folders.length){
    g.outerHTML='<div class="no-folders" id="folderGrid">No subfolders</div>';
    return;
  }
  g.innerHTML=folders.map(f=>
    `<div class="folder-card" onclick="enterFolder('${f.id}','${escH(f.name).replace(/'/g,"\\'")}')">
      <span class="folder-icon">${FOLDER_SVG}</span>
      <span class="folder-name" title="${escH(f.name)}">${escH(f.name)}</span>
    </div>`
  ).join('');
}
function enterFolder(id,name){stack.push({id,name});load(id)}

/* ─── Gallery ─── */
function renderGallery(files,parentId){
  const g=document.getElementById('galleryGrid');
  document.getElementById('fileCount').textContent=files.length?files.length+' file'+(files.length>1?'s':''):'';
  if(!files.length){g.innerHTML='<div class="empty-msg" style="grid-column:1/-1">No files in this folder</div>';return}

  g.innerHTML=files.map(f=>{
    const isImg=IMG.test(f.name),isVid=VID.test(f.name),prev=isImg||isVid;
    const date=f.modifiedTime?new Date(f.modifiedTime).toLocaleDateString():'';
    const esc=escH(f.name).replace(/'/g,"\\'");
    const icon=isVid?'🎬':isImg?'🖼':'📄';

    let thumb=f.thumbnailLink
      ?`<img src="/api/browser/thumbnail/${f.id}" class="loading"
          onload="this.classList.remove('loading');this.classList.add('loaded')"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          alt="${escH(f.name)}">
         <div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;"><span class="g-icon">${icon}</span></div>`
      :`<span class="g-icon">${icon}</span>`;

    const playOv=isVid?`<div class="play-ov"><div class="play-ring">▶</div></div>`:'';
    const thumbClick=prev
      ?`onclick="openPreview('${f.id}','${esc}','${isVid?'video':'image'}','${escH(f.webViewLink||'')}')"`
      :`onclick="window.open('${escH(f.webViewLink||'#')}','_blank')"`;

    return `<div class="gallery-card" id="gcard-${f.id}">
      <div class="g-thumb" ${thumbClick}>${thumb}${playOv}</div>
      <div class="g-info">
        <span class="g-name" id="gname-${f.id}" title="${escH(f.name)}">${escH(f.name)}</span>
        <span class="g-meta">${fmtBytes(f.size)}${date?' · '+date:''}</span>
      </div>
      <div class="g-actions">
        ${prev?`<button class="act" onclick="openPreview('${f.id}','${esc}','${isVid?'video':'image'}','${escH(f.webViewLink||'')}')">Preview</button>`:''}
        <a class="act" href="/api/browser/download/${f.id}">↓ Download</a>
        <button class="act" onclick="startRename('${f.id}','${esc}')">Rename</button>
        <button class="act" onclick="startMove('${f.id}','${parentId}')">Move</button>
        <button class="act danger" onclick="deleteFile('${f.id}','${esc}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

/* ─── Preview ─── */
function openPreview(fileId,fileName,type,viewLink){
  document.getElementById('previewTitle').textContent=fileName;
  const body=document.getElementById('previewBody'),ft=document.getElementById('previewFt');
  body.innerHTML=type==='image'
    ?`<img src="/api/browser/download/${fileId}" alt="${escH(fileName)}">`
    :`<iframe src="https://drive.google.com/file/d/${fileId}/preview" allowfullscreen></iframe>`;
  ft.innerHTML=`<a class="act" href="/api/browser/download/${fileId}" style="display:inline-block">↓ Download</a>${viewLink?`<a class="act" href="${escH(viewLink)}" target="_blank">↗ Open in Drive</a>`:''}`;
  document.getElementById('previewOverlay').classList.add('open');
}
function closePreview(){document.getElementById('previewOverlay').classList.remove('open');document.getElementById('previewBody').innerHTML='';document.getElementById('previewFt').innerHTML=''}

/* ─── Rename ─── */
function startRename(fileId,currentName){
  const nameEl=document.getElementById('gname-'+fileId);if(!nameEl)return;
  const inp=document.createElement('input');inp.className='rename-inp';inp.value=currentName;
  nameEl.replaceWith(inp);inp.focus();inp.select();
  const restore=n=>{const s=document.createElement('span');s.className='g-name';s.id='gname-'+fileId;s.title=n;s.textContent=n;inp.replaceWith(s)};
  const save=async()=>{
    const n=inp.value.trim();if(!n||n===currentName){restore(currentName);return}
    const res=await fetch('/api/browser/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_id:fileId,new_name:n})});
    const d=await res.json();d.ok?(showToast('Renamed',true),restore(d.name)):(showToast(d.error||'Failed',false),restore(currentName));
  };
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape')restore(currentName)});
  inp.addEventListener('blur',save);
}

/* ─── Delete ─── */
async function deleteFile(fileId,name){
  if(!confirm('Delete "'+name+'"?\n\nThis cannot be undone.'))return;
  const res=await fetch('/api/files/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_id:fileId})});
  const d=await res.json();d.ok?(showToast('Deleted',true),document.getElementById('gcard-'+fileId)?.remove()):showToast(d.error||'Failed',false);
}

/* ─── Move ─── */
function startMove(fileId,oldParent){movingFile={id:fileId,oldParent};moveStack=[{id:'root',name:'My Drive'}];document.getElementById('moveOverlay').classList.add('open');loadMoveFolder('root')}
function closeMoveModal(){document.getElementById('moveOverlay').classList.remove('open');movingFile=null}
function updateMoveBc(){
  document.getElementById('moveBc').innerHTML=moveStack.map((f,i)=>`<span onclick="moveNavTo(${i})">${escH(f.name)}</span>`).join(' › ');
  document.getElementById('moveCur').textContent=moveStack.map(f=>f.name).join(' › ');
}
function moveNavTo(i){moveStack=moveStack.slice(0,i+1);loadMoveFolder(moveStack[moveStack.length-1].id)}
async function loadMoveFolder(parentId){
  document.getElementById('moveBody').innerHTML='<div class="move-empty"><span class="spinner"></span>Loading…</div>';
  updateMoveBc();
  const res=await fetch('/api/browser?parent='+parentId);
  const d=await res.json();
  const body=document.getElementById('moveBody');
  if(!d.ok||!d.folders.length){body.innerHTML='<div class="move-empty">No subfolders here</div>';return}
  body.innerHTML=d.folders.map(f=>
    `<div class="move-item" onclick="enterMoveFolder('${f.id}','${escH(f.name).replace(/'/g,"\\'")}')">
      <span class="move-item-name">${FOLDER_SVG} ${escH(f.name)}</span>
      <span class="move-item-arr">${CHEV_SVG}</span>
    </div>`
  ).join('');
}
function enterMoveFolder(id,name){moveStack.push({id,name});loadMoveFolder(id)}
async function confirmMove(){
  if(!movingFile)return;
  const newParent=moveStack[moveStack.length-1].id;
  if(newParent===movingFile.oldParent){showToast('Already in this folder',false);return}
  const res=await fetch('/api/browser/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_id:movingFile.id,new_parent:newParent,old_parent:movingFile.oldParent})});
  const d=await res.json();closeMoveModal();
  d.ok?(showToast('Moved!',true),document.getElementById('gcard-'+movingFile.id)?.remove()):showToast(d.error||'Failed',false);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePreview();closeMoveModal()}});

/* ─── Boot ─── */
load('root');
</script>
</body>
</html>
