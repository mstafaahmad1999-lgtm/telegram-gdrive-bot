<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Browser — Drive Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .nav-brand { font-weight: 700; font-size: 1rem; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
  .nav-links { display: flex; align-items: center; gap: 16px; }
  .nav-links a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; }
  .nav-links a:hover { color: #f1f5f9; }
  .logout-btn { background: #334155; color: #cbd5e1; border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; text-decoration: none; }

  main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

  /* breadcrumb */
  .breadcrumb { display: flex; align-items: center; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .crumb { color: #60a5fa; cursor: pointer; font-size: 0.9rem; }
  .crumb:hover { text-decoration: underline; }
  .crumb-sep { color: #334155; }
  .crumb-current { color: #94a3b8; font-size: 0.9rem; }

  /* section header */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 0.85rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }

  /* folders */
  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 32px; }
  .folder-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; align-items: center; gap: 10px; }
  .folder-card:hover { border-color: #3b82f6; background: #1e3a5f33; }
  .folder-card span { font-size: 0.85rem; color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* gallery */
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .gallery-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .gallery-card:hover { border-color: #3b82f6; transform: translateY(-2px); }

  .gallery-thumb {
    width: 100%; aspect-ratio: 16/10; background: #0f172a;
    position: relative; cursor: pointer; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
  .gallery-thumb img.loading { opacity: 0; }
  .gallery-thumb img.loaded { opacity: 1; }
  .thumb-placeholder { font-size: 3rem; color: #334155; user-select: none; }
  .thumb-placeholder.vid { color: #1d4ed8; }
  .thumb-placeholder.img { color: #065f46; }
  .thumb-placeholder.doc { color: #92400e; }

  .play-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35); opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .play-btn-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; padding-left: 4px; }
  .gallery-thumb:hover .play-overlay { opacity: 1; }

  .gallery-info { padding: 10px 12px 4px; }
  .gallery-name { font-size: 0.8rem; color: #cbd5e1; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
  .gallery-meta { font-size: 0.72rem; color: #475569; }

  .gallery-actions {
    padding: 8px 10px 10px;
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .act-btn {
    flex: 1; min-width: 0; padding: 5px 6px; border-radius: 6px; border: 1px solid #334155;
    background: transparent; color: #94a3b8; font-size: 0.7rem; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; text-align: center; text-decoration: none; display: inline-block;
  }
  .act-btn:hover { background: #263347; color: #f1f5f9; border-color: #475569; }
  .act-btn.red { border-color: #7f1d1d; color: #fca5a5; }
  .act-btn.red:hover { background: #450a0a; }
  .act-btn.blue { border-color: #1e3a5f; color: #60a5fa; }
  .act-btn.blue:hover { background: #1e3a5f; }

  .rename-input { background: #0f172a; border: 1px solid #3b82f6; border-radius: 6px; color: #f1f5f9; padding: 4px 8px; font-size: 0.8rem; width: 100%; outline: none; }

  .empty { color: #475569; font-size: 0.875rem; padding: 48px; text-align: center; }
  .loading-msg { color: #475569; font-size: 0.875rem; padding: 48px; text-align: center; }

  /* preview modal */
  .preview-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
  .preview-overlay.open { display: flex; }
  .preview-box { background: #1e293b; border: 1px solid #334155; border-radius: 16px; max-width: 92vw; max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 32px 64px rgba(0,0,0,0.8); }
  .preview-header { padding: 12px 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .preview-title { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60vw; }
  .preview-close { background: none; border: none; color: #64748b; font-size: 1.4rem; cursor: pointer; flex-shrink: 0; }
  .preview-close:hover { color: #f1f5f9; }
  .preview-body { display: flex; align-items: center; justify-content: center; overflow: auto; flex: 1; padding: 16px; min-width: 300px; min-height: 200px; }
  .preview-body img { max-width: 85vw; max-height: 78vh; border-radius: 8px; display: block; }
  .preview-body iframe { border: none; border-radius: 8px; width: 75vw; height: 60vh; }
  .preview-body video { max-width: 85vw; max-height: 78vh; border-radius: 8px; }
  .preview-footer { padding: 12px 20px; border-top: 1px solid #334155; display: flex; justify-content: flex-end; gap: 8px; }
  .pf-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 0.85rem; cursor: pointer; text-decoration: none; display: inline-block; }
  .pf-btn:hover { background: #263347; color: #f1f5f9; }
  .pf-btn.blue { border-color: #1e3a5f; color: #60a5fa; }
  .pf-btn.blue:hover { background: #1e3a5f; }

  /* move modal */
  .move-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; }
  .move-overlay.open { display: flex; }
  .move-modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; width: 400px; max-width: 95vw; max-height: 70vh; display: flex; flex-direction: column; box-shadow: 0 24px 48px rgba(0,0,0,0.5); overflow: hidden; }
  .move-header { padding: 16px 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
  .move-title { font-weight: 600; font-size: 0.95rem; color: #f1f5f9; }
  .move-close { background: none; border: none; color: #64748b; font-size: 1.2rem; cursor: pointer; }
  .move-breadcrumb { padding: 8px 16px; background: #0f172a; font-size: 0.78rem; color: #64748b; border-bottom: 1px solid #1e293b; }
  .move-breadcrumb span { cursor: pointer; }
  .move-breadcrumb span:hover { color: #60a5fa; }
  .move-body { overflow-y: auto; flex: 1; padding: 8px; }
  .move-folder-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .move-folder-item:hover { background: #263347; }
  .move-folder-item span { font-size: 0.875rem; color: #cbd5e1; }
  .move-footer { padding: 14px 20px; border-top: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .move-current { font-size: 0.78rem; color: #64748b; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .move-confirm { padding: 8px 18px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
  .move-confirm:hover { background: #2563eb; }

  #toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 0.875rem; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999; }
  #toast.show { opacity: 1; }
  #toast.ok { background: #14532d; color: #86efac; border: 1px solid #166534; }
  #toast.err { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><span>☁️</span> File Browser</div>
  <div class="nav-links">
    <a href="/">↩ Dashboard</a>
    <a href="/logout" class="logout-btn">Sign out</a>
  </div>
</nav>

<main>
  <div class="breadcrumb" id="breadcrumb"></div>

  <div id="foldersSection">
    <div class="section-header"><span class="section-title">📁 Folders</span></div>
    <div class="folder-grid" id="folderGrid"><div class="loading-msg">Loading…</div></div>
  </div>

  <div id="filesSection" style="margin-top:28px;">
    <div class="section-header">
      <span class="section-title">📄 Files</span>
      <span id="fileCount" style="font-size:0.8rem;color:#475569;"></span>
    </div>
    <div class="gallery-grid" id="galleryGrid"><div class="loading-msg" style="grid-column:1/-1;">Loading…</div></div>
  </div>
</main>

<!-- Preview modal -->
<div class="preview-overlay" id="previewOverlay" onclick="if(event.target===this)closePreview()">
  <div class="preview-box">
    <div class="preview-header">
      <span class="preview-title" id="previewTitle"></span>
      <button class="preview-close" onclick="closePreview()">✕</button>
    </div>
    <div class="preview-body" id="previewBody"></div>
    <div class="preview-footer" id="previewFooter"></div>
  </div>
</div>

<!-- Move modal -->
<div class="move-overlay" id="moveOverlay" onclick="if(event.target===this)closeMoveModal()">
  <div class="move-modal">
    <div class="move-header">
      <span class="move-title">Move to folder</span>
      <button class="move-close" onclick="closeMoveModal()">✕</button>
    </div>
    <div class="move-breadcrumb" id="moveBreadcrumb"></div>
    <div class="move-body" id="moveBody"></div>
    <div class="move-footer">
      <span class="move-current" id="moveCurrentLabel"></span>
      <button class="move-confirm" onclick="confirmMove()">📁 Move here</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── state ──
let stack = [{ id: 'root', name: 'My Drive' }];
let moveStack = [{ id: 'root', name: 'My Drive' }];
let movingFile = null;

const IMAGE_EXT = /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i;
const VIDEO_EXT = /\.(mp4|webm|mov|m4v|avi|mkv)$/i;

function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + (ok ? 'ok' : 'err');
  setTimeout(() => t.className = '', 3000);
}

function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtBytes(b) {
  b = parseInt(b || 0);
  if (b >= 1073741824) return (b/1073741824).toFixed(2)+' GB';
  if (b >= 1048576) return (b/1048576).toFixed(1)+' MB';
  if (b >= 1024) return (b/1024).toFixed(1)+' KB';
  return b ? b+' B' : '—';
}

function thumbIcon(name) {
  if (VIDEO_EXT.test(name)) return '<span class="thumb-placeholder vid">🎬</span>';
  if (IMAGE_EXT.test(name)) return '<span class="thumb-placeholder img">🖼️</span>';
  if (/\.(pdf)$/i.test(name)) return '<span class="thumb-placeholder doc">📕</span>';
  if (/\.(doc|docx)$/i.test(name)) return '<span class="thumb-placeholder doc">📝</span>';
  return '<span class="thumb-placeholder">📄</span>';
}

// ── navigation ──
function currentId() { return stack[stack.length - 1].id; }

async function load(parentId) {
  document.getElementById('folderGrid').innerHTML = '<div class="loading-msg">Loading…</div>';
  document.getElementById('galleryGrid').innerHTML = '<div class="loading-msg" style="grid-column:1/-1;">Loading…</div>';
  renderBreadcrumb();

  const res = await fetch('/api/browser?parent=' + parentId);
  const data = await res.json();
  if (!data.ok) { showToast('❌ ' + data.error, false); return; }

  renderFolders(data.folders);
  renderGallery(data.files, parentId);
}

function renderBreadcrumb() {
  document.getElementById('breadcrumb').innerHTML = stack.map((f, i) =>
    i === stack.length - 1
      ? `<span class="crumb-current">📂 ${escH(f.name)}</span>`
      : `<span class="crumb" onclick="navTo(${i})">📂 ${escH(f.name)}</span><span class="crumb-sep">›</span>`
  ).join('');
}

function navTo(i) { stack = stack.slice(0, i + 1); load(currentId()); }

function renderFolders(folders) {
  const grid = document.getElementById('folderGrid');
  if (!folders.length) { grid.innerHTML = '<div style="color:#475569;font-size:0.85rem;padding:12px 0;">No subfolders</div>'; return; }
  grid.innerHTML = folders.map(f =>
    `<div class="folder-card" onclick="enterFolder('${f.id}','${escH(f.name).replace(/'/g,"\\'")}')">
       <span style="font-size:1.2rem;flex-shrink:0;">📁</span>
       <span title="${escH(f.name)}">${escH(f.name)}</span>
     </div>`
  ).join('');
}

function enterFolder(id, name) { stack.push({ id, name }); load(id); }

// ── gallery ──
function renderGallery(files, parentId) {
  const grid = document.getElementById('galleryGrid');
  document.getElementById('fileCount').textContent = files.length ? files.length + ' file' + (files.length > 1 ? 's' : '') : '';

  if (!files.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">No files in this folder</div>';
    return;
  }

  grid.innerHTML = files.map(f => {
    const isImg = IMAGE_EXT.test(f.name);
    const isVid = VIDEO_EXT.test(f.name);
    const previewable = isImg || isVid;
    const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString() : '—';
    const dlHref = `/api/browser/download/${f.id}`;

    let thumbHtml;
    if (f.thumbnailLink) {
      thumbHtml = `<img src="/api/browser/thumbnail/${f.id}" class="loading"
        onload="this.classList.remove('loading');this.classList.add('loaded')"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
        alt="${escH(f.name)}">
        <div style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;">${thumbIcon(f.name)}</div>`;
    } else {
      thumbHtml = thumbIcon(f.name);
    }

    const playOverlay = isVid ? `<div class="play-overlay"><div class="play-btn-icon">▶</div></div>` : '';
    const thumbClick = previewable ? `onclick="openPreview('${f.id}','${escH(f.name).replace(/'/g,"\\'")}','${isVid?'video':'image'}', '${escH(f.webViewLink||'')}')"` : `onclick="window.open('${escH(f.webViewLink||'#')}','_blank')"`;

    return `<div class="gallery-card" id="gcard-${f.id}">
      <div class="gallery-thumb" ${thumbClick}>
        ${thumbHtml}
        ${playOverlay}
      </div>
      <div class="gallery-info">
        <span class="gallery-name" id="gname-${f.id}" title="${escH(f.name)}">${escH(f.name)}</span>
        <span class="gallery-meta">${fmtBytes(f.size)} · ${date}</span>
      </div>
      <div class="gallery-actions">
        <a class="act-btn blue" href="${dlHref}" title="Download">⬇ Download</a>
        <button class="act-btn" onclick="startRename('${f.id}','${escH(f.name).replace(/'/g,"\\'")}')">✏️ Rename</button>
        <button class="act-btn" onclick="startMove('${f.id}','${parentId}')">📁 Move</button>
        <button class="act-btn red" onclick="deleteFile('${f.id}','${escH(f.name).replace(/'/g,"\\'")}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ── preview ──
function openPreview(fileId, fileName, type, viewLink) {
  document.getElementById('previewTitle').textContent = fileName;
  const body = document.getElementById('previewBody');
  const footer = document.getElementById('previewFooter');

  if (type === 'image') {
    body.innerHTML = `<img src="/api/browser/download/${fileId}" alt="${escH(fileName)}">`;
  } else {
    body.innerHTML = `<iframe src="https://drive.google.com/file/d/${fileId}/preview" allowfullscreen></iframe>`;
  }

  footer.innerHTML = `<a class="pf-btn blue" href="/api/browser/download/${fileId}">⬇ Download</a>
    ${viewLink ? `<a class="pf-btn" href="${escH(viewLink)}" target="_blank">↗ Open in Drive</a>` : ''}`;

  document.getElementById('previewOverlay').classList.add('open');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('open');
  document.getElementById('previewBody').innerHTML = '';
  document.getElementById('previewFooter').innerHTML = '';
}

// ── rename ──
function startRename(fileId, currentName) {
  const nameEl = document.getElementById('gname-' + fileId);
  if (!nameEl) return;
  const input = document.createElement('input');
  input.className = 'rename-input'; input.value = currentName;
  nameEl.replaceWith(input);
  input.focus(); input.select();

  const restore = (name) => {
    const span = document.createElement('span');
    span.className = 'gallery-name'; span.id = 'gname-' + fileId;
    span.title = name; span.textContent = name;
    input.replaceWith(span);
  };

  const save = async () => {
    const newName = input.value.trim();
    if (!newName || newName === currentName) { restore(currentName); return; }
    const res = await fetch('/api/browser/rename', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ file_id: fileId, new_name: newName }) });
    const data = await res.json();
    if (data.ok) { showToast('✅ Renamed', true); restore(data.name); }
    else { showToast('❌ ' + data.error, false); restore(currentName); }
  };

  input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') restore(currentName); });
  input.addEventListener('blur', save);
}

// ── delete ──
async function deleteFile(fileId, name) {
  if (!confirm('Delete "' + name + '"?\n\nThis cannot be undone.')) return;
  const res = await fetch('/api/files/delete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ file_id: fileId }) });
  const data = await res.json();
  if (data.ok) { showToast('🗑 Deleted', true); document.getElementById('gcard-' + fileId)?.remove(); }
  else showToast('❌ ' + (data.error || 'Failed'), false);
}

// ── move ──
function startMove(fileId, oldParent) {
  movingFile = { id: fileId, oldParent };
  moveStack = [{ id: 'root', name: 'My Drive' }];
  document.getElementById('moveOverlay').classList.add('open');
  loadMoveFolder('root');
}

function closeMoveModal() { document.getElementById('moveOverlay').classList.remove('open'); movingFile = null; }

async function loadMoveFolder(parentId) {
  document.getElementById('moveBody').innerHTML = '<div style="color:#475569;padding:20px;text-align:center;">Loading…</div>';
  updateMoveBreadcrumb();
  const res = await fetch('/api/browser?parent=' + parentId);
  const data = await res.json();
  const body = document.getElementById('moveBody');
  if (!data.ok || !data.folders.length) { body.innerHTML = '<div style="color:#475569;padding:20px;text-align:center;">No subfolders here</div>'; return; }
  body.innerHTML = data.folders.map(f =>
    `<div class="move-folder-item" onclick="enterMoveFolder('${f.id}','${escH(f.name).replace(/'/g,"\\'")}')">
       <span>📁 ${escH(f.name)}</span><span style="color:#475569;font-size:0.75rem;">▶</span>
     </div>`
  ).join('');
}

function enterMoveFolder(id, name) { moveStack.push({ id, name }); loadMoveFolder(id); }

function updateMoveBreadcrumb() {
  document.getElementById('moveBreadcrumb').innerHTML = '📂 ' + moveStack.map((f, i) => `<span onclick="moveNavTo(${i})">${escH(f.name)}</span>`).join(' › ');
  document.getElementById('moveCurrentLabel').textContent = '📂 ' + moveStack.map(f => f.name).join(' › ');
}

function moveNavTo(i) { moveStack = moveStack.slice(0, i + 1); loadMoveFolder(moveStack[moveStack.length - 1].id); }

async function confirmMove() {
  if (!movingFile) return;
  const newParent = moveStack[moveStack.length - 1].id;
  if (newParent === movingFile.oldParent) { showToast('Already in this folder', false); return; }
  const res = await fetch('/api/browser/move', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ file_id: movingFile.id, new_parent: newParent, old_parent: movingFile.oldParent }) });
  const data = await res.json();
  closeMoveModal();
  if (data.ok) { showToast('✅ Moved!', true); document.getElementById('gcard-' + movingFile.id)?.remove(); }
  else showToast('❌ ' + (data.error || 'Failed'), false);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closePreview(); closeMoveModal(); } });

load('root');
</script>
</body>
</html>
