<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOVAN — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #gl-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Animations ── */
    @keyframes fadeScaleIn {
      from { opacity: 0; transform: translate(-50%,-50%) scale(0.82); filter: blur(6px); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1);    filter: blur(0px); }
    }
    @keyframes dissolveOut {
      from { opacity: 1; transform: translate(-50%,-50%) scale(1);    filter: blur(0px); }
      to   { opacity: 0; transform: translate(-50%,-50%) scale(1.18); filter: blur(10px); }
    }
    @keyframes loginReveal {
      from { opacity: 0; transform: scale(0.96); filter: blur(6px); }
      to   { opacity: 1; transform: scale(1);    filter: blur(0px); }
    }

    /* ── Symbol ── */
    #symbol {
      position: fixed;
      top: 50%; left: 50%;
      width: 38vw;
      max-width: 600px;
      height: auto;
      filter: invert(1);
      mix-blend-mode: screen;
      animation: fadeScaleIn 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
      pointer-events: none;
    }
    #symbol.dissolve {
      animation: dissolveOut 0.9s cubic-bezier(0.4,0,1,1) forwards;
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      animation: loginReveal 1.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 384px;
      padding: 2rem 2rem 1.75rem;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      width: 200px;
      margin: 0 auto 1.5rem;
    }
    .logo-wrap img.wordmark {
      width: 200px;
      height: auto;
      filter: invert(1);
      mix-blend-mode: screen;
      display: block;
    }
    #wordmark-fb {
      display: none;
      color: #fff;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: .3em;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }
    .star-cover {
      position: absolute;
      top: 48%; left: 32%;
      transform: translate(-50%, -50%);
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgb(10,10,14);
      pointer-events: none;
    }
    .star-blue {
      position: absolute;
      top: 48%; left: 32%;
      transform: translate(-50%, -50%);
      width: 28px; height: 28px;
      filter: invert(45%) sepia(90%) saturate(600%) hue-rotate(200deg) brightness(1.2);
      pointer-events: none;
    }

    /* ── Subtitle ── */
    .subtitle {
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      margin-bottom: 1.75rem;
    }

    /* ── Error banner ── */
    .error-banner {
      background: rgba(127,29,29,0.6);
      border: 1px solid rgba(252,165,165,0.3);
      color: #fca5a5;
      border-radius: 0.5rem;
      padding: 0.625rem 0.875rem;
      font-size: 0.8rem;
      margin-bottom: 1.25rem;
      text-align: center;
      text-shadow: none;
    }

    /* ── Floating label fields ── */
    .field {
      position: relative;
      margin-bottom: 2rem;
    }
    .field input {
      display: block;
      width: 100%;
      padding: 0.625rem 0;
      font-size: 1rem;
      color: #fff;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(255,255,255,0.4);
      outline: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      caret-color: #60a5fa;
      transition: border-color 0.3s;
    }
    .field input:focus {
      border-bottom-color: #60a5fa;
    }
    .field label {
      position: absolute;
      top: 0.7rem; left: 0;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: top 0.25s, font-size 0.25s, color 0.25s;
      pointer-events: none;
    }
    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label {
      top: -1.1rem;
      font-size: 0.72rem;
      color: #93c5fd;
    }

    /* ── Forgot / Remember ── */
    .row-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .remember-row input[type=checkbox] {
      width: 14px; height: 14px;
      accent-color: #3b82f6;
      cursor: pointer;
    }
    .remember-row label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
    .forgot a {
      font-size: 0.72rem;
      color: rgba(96,165,250,0.8);
      text-decoration: none;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      transition: color 0.2s;
    }
    .forgot a:hover { color: #93c5fd; }

    /* ── Sign In button ── */
    .btn-signin {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #1d4ed8 100%);
      box-shadow: 0 4px 24px rgba(37,99,235,0.35);
      transition: opacity 0.25s, transform 0.2s, box-shadow 0.2s;
    }
    .btn-signin:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 32px rgba(37,99,235,0.5);
    }
    .btn-signin .arrow { transition: transform 0.2s; }
    .btn-signin:hover .arrow { transform: translateX(4px); }

    /* ── Password eye toggle ── */
    .pw-eye {
      position: absolute;
      right: 0; top: 50%; transform: translateY(-50%);
      background: none; border: none; padding: 4px 2px;
      color: rgba(255,255,255,0.35); cursor: pointer;
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .pw-eye:hover { color: rgba(255,255,255,0.7); }

    /* ── Footer ── */
    .card-footer {
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 1.25rem;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
    .card-footer a {
      font-weight: 600;
      color: #60a5fa;
      text-decoration: none;
      transition: color 0.2s;
    }
    .card-footer a:hover { color: #93c5fd; }
  </style>
</head>
<body>

<!-- WebGL background -->
<canvas id="gl-canvas"></canvas>

<!-- Act 1: Symbol -->
<img id="symbol" src="/static/sovan-symbol.svg" alt="" aria-hidden="true" />

<!-- Act 2: Login form -->
<div id="login-overlay" style="display:none;">
  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img class="wordmark" src="/static/sovan-logo.png" alt="SOVAN"
           onerror="this.style.display='none';document.getElementById('wordmark-fb').style.display='block'" />
      <div id="wordmark-fb">SOVAN</div>
      <div class="star-cover"></div>
      <img class="star-blue" src="/static/sovan-symbol.svg" alt="" aria-hidden="true" />
    </div>

    <p class="subtitle">Sign in to continue</p>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="post">
      <!-- Username -->
      <div class="field">
        <input type="text" id="username" name="username" placeholder=" " required autocomplete="username" autofocus />
        <label for="username">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Username
        </label>
      </div>

      <!-- Password -->
      <div class="field">
        <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password" style="padding-right:28px" />
        <label for="password">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Password
        </label>
        <button type="button" class="pw-eye" onclick="togglePw('password',this)" tabindex="-1" aria-label="Show password">
          <svg id="eye-icon-password" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="row-actions">
        <div class="remember-row">
          <input type="checkbox" name="remember" id="remember" />
          <label for="remember">Remember me for 30 days</label>
        </div>
        <div class="forgot"><a href="#">Forgot Password?</a></div>
      </div>

      <button type="submit" class="btn-signin">
        Sign In
        <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </form>

    <p class="card-footer">
      Don't have an account? <a href="/signup">Sign Up</a>
    </p>

  </div>
</div>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
// ── WebGL Shader ──────────────────────────────────────────────
const canvas   = document.getElementById('gl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000);

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, -1);

const uniforms = {
  resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  time:       { value: 0.0 },
  xScale:     { value: 1.0 },
  yScale:     { value: 0.5 },
  distortion: { value: 0.05 },
};

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
  -1,-1,0,  1,-1,0, -1,1,0,
   1,-1,0, -1, 1,0,  1,1,0,
]), 3));

scene.add(new THREE.Mesh(geo, new THREE.RawShaderMaterial({
  uniforms,
  side: THREE.DoubleSide,
  vertexShader: `
    attribute vec3 position;
    void main() { gl_Position = vec4(position, 1.0); }
  `,
  fragmentShader: `
    precision highp float;
    uniform vec2  resolution;
    uniform float time;
    uniform float xScale;
    uniform float yScale;
    uniform float distortion;
    void main() {
      vec2  p  = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
      float d  = length(p) * distortion;
      float rx = p.x * (1.0 + d);
      float gx = p.x;
      float bx = p.x * (1.0 - d);
      float r  = 0.05 / abs(p.y + sin((rx + time) * xScale) * yScale);
      float g  = 0.05 / abs(p.y + sin((gx + time) * xScale) * yScale);
      float b  = 0.05 / abs(p.y + sin((bx + time) * xScale) * yScale);
      gl_FragColor = vec4(r, g, b, 1.0);
    }
  `,
})));

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
}
onResize();
window.addEventListener('resize', onResize);

(function tick() {
  uniforms.time.value += 0.01;
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
})();

// ── Intro sequence ────────────────────────────────────────────
const symbol       = document.getElementById('symbol');
const loginOverlay = document.getElementById('login-overlay');

setTimeout(() => symbol.classList.add('dissolve'), 3000);
setTimeout(() => {
  symbol.style.display = 'none';
  loginOverlay.style.display = 'flex';
}, 3900);

function togglePw(id, btn) {
  const input = document.getElementById(id);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.querySelector('svg').innerHTML = isHidden
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
</script>

</body>
</html>
