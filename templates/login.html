<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Drive Bot Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    font-size: 2.5rem;
    text-align: center;
    margin-bottom: 8px;
  }
  h1 {
    color: #f1f5f9;
    font-size: 1.25rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 4px;
  }
  .sub {
    color: #64748b;
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 28px;
  }
  label {
    display: block;
    color: #94a3b8;
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  input[type=password] {
    width: 100%;
    padding: 11px 14px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #f1f5f9;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=password]:focus { border-color: #3b82f6; }
  .error {
    background: #450a0a;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.2s;
  }
  button:hover { background: #2563eb; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">☁️</div>
  <h1>Drive Bot Dashboard</h1>
  <p class="sub">Enter your dashboard password to continue</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post">
    <label>Password</label>
    <input type="password" name="password" autofocus placeholder="••••••••">
    <button type="submit">Sign in →</button>
  </form>
</div>
</body>
</html>
