<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOVAN — Archive</title>
<meta name="description" content="Crafted Beyond Fashion — the SOVAN design archive.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── tokens ─────────────────────────────────────────────────────────────── */
:root {
  --black:   #0D0D0D;
  --white:   #F5F2EC;
  --gold:    #C9A84C;
  --graph:   #1A1816;
  --smoke:   #8C8275;
  --font-d:  'Cormorant Garamond', Georgia, serif;
  --font-b:  'DM Sans', system-ui, sans-serif;
  --font-m:  'IBM Plex Mono', 'Courier New', monospace;
  --ease:    cubic-bezier(.25,.46,.45,.94);
  --z-thread: 10;
  --z-lb:    100;
}

/* ─── reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-b);
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
img, video { display: block; max-width: 100%; }
button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }

/* ─── gold thread (desktop) ──────────────────────────────────────────────── */
#thread {
  position: fixed;
  left: 32px;
  top: 0;
  width: 1px;
  height: 100vh;
  background: linear-gradient(to bottom, transparent, var(--gold) 5%, var(--gold));
  transform-origin: top center;
  transform: scaleY(0);
  transition: transform .1s linear;
  z-index: var(--z-thread);
  pointer-events: none;
}
#thread-knot {
  position: fixed;
  left: 28px;
  top: 0;
  width: 9px;
  height: 9px;
  border: 1px solid var(--gold);
  transform: rotate(45deg) translateX(calc(var(--scroll-pct, 0) * (100vh - 9px)));
  z-index: var(--z-thread);
  pointer-events: none;
  transition: top .15s var(--ease);
}
#thread-knot.pulse {
  animation: knot-pulse .5s var(--ease);
}
@keyframes knot-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(201,168,76,.6); }
  50%  { box-shadow: 0 0 0 8px rgba(201,168,76,0); }
  100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
}

/* mobile: top progress bar instead */
#progress-bar {
  display: none;
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  width: 0%;
  background: var(--gold);
  z-index: var(--z-thread);
  transition: width .1s linear;
}

/* ─── hero ───────────────────────────────────────────────────────────────── */
#hero {
  position: relative;
  width: 100%;
  height: 100svh;
  min-height: 500px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1.4s var(--ease);
}
.hero-slide.active { opacity: 1; }
.hero-slide.next   { opacity: 0; }

/* dark veil */
#hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    rgba(13,13,13,.35) 0%,
    rgba(13,13,13,.15) 40%,
    rgba(13,13,13,.55) 85%,
    rgba(13,13,13,.85) 100%
  );
  pointer-events: none;
}

.hero-center {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 0 24px;
}
.hero-wordmark {
  font-family: var(--font-d);
  font-size: clamp(4rem, 14vw, 11rem);
  font-weight: 400;
  letter-spacing: .18em;
  color: var(--white);
  line-height: 1;
  margin-bottom: 16px;
}
.hero-stitch {
  display: block;
  margin: 0 auto 32px;
  overflow: visible;
}
.stitch-line {
  stroke: var(--gold);
  stroke-width: 1.5;
  fill: none;
  stroke-dasharray: 200;
  stroke-dashoffset: 200;
}
.stitch-line.animate {
  animation: stitch-draw 1.2s var(--ease) forwards;
  animation-delay: .3s;
}
@keyframes stitch-draw {
  to { stroke-dashoffset: 0; }
}
.hero-tagline {
  font-family: var(--font-m);
  font-size: clamp(.7rem, 1.4vw, .85rem);
  letter-spacing: .35em;
  color: var(--smoke);
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .8s var(--ease) 1.6s, transform .8s var(--ease) 1.6s;
}
.hero-tagline.visible { opacity: 1; transform: none; }

.hero-scroll-cue {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: .5;
  animation: scroll-bob 2s var(--ease) infinite 2s;
}
.hero-scroll-cue span {
  font-family: var(--font-m);
  font-size: .65rem;
  letter-spacing: .3em;
  color: var(--smoke);
  text-transform: uppercase;
}
.hero-scroll-cue svg { stroke: var(--smoke); }
@keyframes scroll-bob {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(6px); }
}

/* ─── sections ───────────────────────────────────────────────────────────── */
.section {
  padding: 100px 80px 80px;
}
.section-label {
  font-family: var(--font-m);
  font-size: .7rem;
  letter-spacing: .4em;
  color: var(--smoke);
  text-transform: uppercase;
  margin-bottom: 48px;
}

/* ─── archive section ────────────────────────────────────────────────────── */
#archive { padding-top: 80px; }

.archive-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid rgba(201,168,76,.18);
  margin-bottom: 32px;
  padding-bottom: 0;
}
.tab-pill {
  font-family: var(--font-m);
  font-size: .75rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--smoke);
  padding: 12px 24px 14px;
  position: relative;
  transition: color .2s;
  cursor: pointer;
}
.tab-pill::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 1px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform .25s var(--ease);
}
.tab-pill.active { color: var(--white); }
.tab-pill.active::after { transform: scaleX(1); }

.filter-chips {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.chip {
  font-family: var(--font-m);
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--smoke);
  border: 1px solid rgba(140,130,117,.35);
  padding: 7px 16px;
  cursor: pointer;
  transition: color .2s, border-color .2s, background .2s;
}
.chip:hover { color: var(--white); border-color: var(--gold); }
.chip.active {
  color: var(--black);
  background: var(--gold);
  border-color: var(--gold);
}

/* masonry grid */
.grid-pane { display: none; }
.grid-pane.active { display: block; }

.masonry-grid {
  columns: 3;
  column-gap: 12px;
}
.grid-item {
  break-inside: avoid;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
  background: var(--graph);
  cursor: pointer;
  /* stagger reveal */
  opacity: 0;
  transform: translateY(22px);
  transition: opacity .5s var(--ease), transform .5s var(--ease);
}
.grid-item.revealed { opacity: 1; transform: none; }
.grid-item img,
.grid-item video {
  width: 100%;
  aspect-ratio: 4/5;
  object-fit: cover;
  display: block;
  transition: transform .45s var(--ease);
}
.grid-item:hover img,
.grid-item:hover video { transform: scale(1.03); }
.grid-item .item-caption {
  position: absolute;
  inset: 0;
  background: rgba(13,13,13,.62);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px;
  opacity: 0;
  transition: opacity .25s;
}
.grid-item:hover .item-caption { opacity: 1; }
.item-name {
  font-family: var(--font-m);
  font-size: .7rem;
  letter-spacing: .12em;
  color: var(--white);
  line-height: 1.4;
}
.item-date {
  font-family: var(--font-m);
  font-size: .6rem;
  letter-spacing: .08em;
  color: var(--smoke);
  margin-top: 4px;
}

/* sort toggle */
.sort-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 20px;
}
.sort-btn {
  font-family: var(--font-m);
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--smoke);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color .2s;
}
.sort-btn:hover { color: var(--gold); }

/* empty / loading */
.grid-msg {
  font-family: var(--font-m);
  font-size: .75rem;
  color: var(--smoke);
  letter-spacing: .2em;
  text-align: center;
  padding: 80px 0;
}

/* ─── lightbox ───────────────────────────────────────────────────────────── */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(13,13,13,.96);
  z-index: var(--z-lb);
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
#lightbox.open { display: flex; }

.lb-media-wrap {
  position: relative;
  max-width: min(90vw, 1100px);
  max-height: 88vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transform-origin: var(--lb-ox, 50%) var(--lb-oy, 50%);
  animation: lb-open .35s var(--ease) forwards;
}
@keyframes lb-open {
  from { opacity: 0; transform: scale(.85); }
  to   { opacity: 1; transform: scale(1); }
}
#lb-img {
  max-width: 100%;
  max-height: 88vh;
  object-fit: contain;
  display: none;
}
#lb-video {
  max-width: 100%;
  max-height: 88vh;
  display: none;
  background: var(--black);
}
#lb-video::-webkit-media-controls { display: none; }

/* custom video controls */
.lb-controls {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 12px 16px;
  background: linear-gradient(transparent, rgba(13,13,13,.85));
  display: none;
  align-items: center;
  gap: 12px;
}
.lb-controls.video-active { display: flex; }
.lb-play {
  width: 32px; height: 32px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--white);
}
.lb-scrubber {
  flex: 1;
  height: 2px;
  background: rgba(245,242,236,.2);
  position: relative;
  cursor: pointer;
}
.lb-scrubber-fill {
  height: 100%;
  background: var(--gold);
  width: 0%;
  pointer-events: none;
  transition: width .1s linear;
}
.lb-time {
  font-family: var(--font-m);
  font-size: .6rem;
  color: var(--smoke);
  white-space: nowrap;
}

.lb-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  color: var(--smoke);
  transition: color .2s;
  z-index: calc(var(--z-lb) + 1);
}
.lb-arrow:hover { color: var(--gold); }
#lb-prev { left: 20px; }
#lb-next { right: 20px; }

.lb-close {
  position: fixed;
  top: 20px; right: 20px;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  color: var(--smoke);
  transition: color .2s;
  z-index: calc(var(--z-lb) + 1);
}
.lb-close:hover { color: var(--white); }

.lb-caption-bar {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: calc(var(--z-lb) + 1);
  pointer-events: none;
}
.lb-caption-name {
  font-family: var(--font-m);
  font-size: .7rem;
  letter-spacing: .15em;
  color: var(--white);
}
.lb-caption-date {
  font-family: var(--font-m);
  font-size: .6rem;
  color: var(--smoke);
  margin-top: 3px;
  letter-spacing: .08em;
}

/* ─── footer ─────────────────────────────────────────────────────────────── */
footer {
  padding: 48px 80px 56px;
  position: relative;
}
footer::before {
  content: '';
  display: block;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold) 20%, var(--gold) 80%, transparent);
  margin-bottom: 40px;
  opacity: .5;
}
.footer-inner {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.footer-mark {
  font-family: var(--font-d);
  font-size: 1.25rem;
  letter-spacing: .2em;
}
.footer-tag {
  font-family: var(--font-m);
  font-size: .6rem;
  letter-spacing: .3em;
  color: var(--smoke);
  text-transform: uppercase;
}

/* ─── reduced-motion overrides ───────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .stitch-line { animation: none; stroke-dashoffset: 0; }
  .hero-tagline { transition: none; }
  .hero-scroll-cue { animation: none; }
  .grid-item { transition: opacity .1s; transform: none !important; }
  .hero-slide { transition: opacity .3s; }
  .lb-media-wrap { animation: none; }
  #thread { transition: none; }
}

/* ─── responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 1024px) {
  .masonry-grid { columns: 2; }
  .section { padding: 80px 48px 64px; }
  footer { padding: 40px 48px 48px; }
  #thread, #thread-knot { display: none; }
  #progress-bar { display: block; }
}
@media (max-width: 640px) {
  .masonry-grid { columns: 1; }
  .section { padding: 64px 20px 48px; }
  footer { padding: 32px 20px 40px; }
  .footer-inner { flex-direction: column; gap: 12px; align-items: flex-start; }
  .archive-tabs { overflow-x: auto; }
  .tab-pill { padding: 12px 18px 14px; }
  .lb-arrow { display: none; }
}
</style>
</head>
<body>

<!-- gold thread (desktop) -->
<div id="thread"></div>
<div id="thread-knot"></div>
<!-- mobile progress bar -->
<div id="progress-bar"></div>

<!-- ─── hero ─────────────────────────────────────────────────────────────── -->
<section id="hero" data-section="hero">
  <!-- slides injected by JS -->
  <div class="hero-center">
    <h1 class="hero-wordmark">SOVAN</h1>
    <svg class="hero-stitch" width="200" height="10" viewBox="0 0 200 10" aria-hidden="true">
      <line class="stitch-line" id="stitchLine" x1="0" y1="5" x2="200" y2="5"/>
    </svg>
    <p class="hero-tagline" id="heroTagline">Crafted Beyond Fashion</p>
  </div>
  <div class="hero-scroll-cue" aria-hidden="true">
    <span>Scroll</span>
    <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 8 8 14 13 8"/>
    </svg>
  </div>
</section>

<!-- ─── archive ───────────────────────────────────────────────────────────── -->
<section id="archive" class="section" data-section="archive">
  <p class="section-label">The Archive</p>

  <div class="archive-tabs" role="tablist">
    <button class="tab-pill active" data-tab="visual" role="tab" aria-selected="true">Visual</button>
    <button class="tab-pill" data-tab="motion" role="tab" aria-selected="false">Motion</button>
  </div>

  <!-- Visual pane -->
  <div id="pane-visual" class="grid-pane active" role="tabpanel">
    <div class="filter-chips" id="visualFilters">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="anime">Anime</button>
    </div>
    <div class="sort-row">
      <button class="sort-btn" id="sortVisual" data-order="newest">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="2 4 6 8 10 4"/>
        </svg>
        <span>Newest</span>
      </button>
    </div>
    <div class="masonry-grid" id="gridVisual">
      <p class="grid-msg" id="msgVisual">Loading archive…</p>
    </div>
  </div>

  <!-- Motion pane -->
  <div id="pane-motion" class="grid-pane" role="tabpanel">
    <div class="sort-row">
      <button class="sort-btn" id="sortMotion" data-order="newest">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="2 4 6 8 10 4"/>
        </svg>
        <span>Newest</span>
      </button>
    </div>
    <div class="masonry-grid" id="gridMotion">
      <p class="grid-msg" id="msgMotion">Loading archive…</p>
    </div>
  </div>
</section>

<!-- ─── footer ────────────────────────────────────────────────────────────── -->
<footer data-section="footer">
  <div class="footer-inner">
    <span class="footer-mark">SOVAN</span>
    <span class="footer-tag">Crafted Beyond Fashion</span>
  </div>
</footer>

<!-- ─── lightbox ──────────────────────────────────────────────────────────── -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Media preview">
  <button class="lb-close" id="lbClose" aria-label="Close">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="4" y1="4" x2="16" y2="16"/><line x1="16" y1="4" x2="4" y2="16"/>
    </svg>
  </button>
  <button class="lb-arrow" id="lb-prev" aria-label="Previous">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <div class="lb-media-wrap" id="lbWrap">
    <img id="lb-img" alt="" />
    <video id="lb-video" playsinline></video>
    <div class="lb-controls" id="lbControls">
      <button class="lb-play" id="lbPlay" aria-label="Play/Pause">
        <svg id="lbPlayIcon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <polygon points="5,3 17,10 5,17"/>
        </svg>
      </button>
      <div class="lb-scrubber" id="lbScrubber" role="slider" aria-label="Seek">
        <div class="lb-scrubber-fill" id="lbFill"></div>
      </div>
      <span class="lb-time" id="lbTime">0:00</span>
    </div>
  </div>
  <button class="lb-arrow" id="lb-next" aria-label="Next">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>
  <div class="lb-caption-bar">
    <p class="lb-caption-name" id="lbName"></p>
    <p class="lb-caption-date" id="lbDate"></p>
  </div>
</div>

<script>
/* ─── state ────────────────────────────────────────────────────────────── */
let manifest = { images: [], videos: [] };
let currentItems = [];   // flat list for lightbox navigation
let lbIndex = 0;
let visualFilter = 'all';
let visualOrder  = 'newest';
let motionOrder  = 'newest';
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ─── utils ────────────────────────────────────────────────────────────── */
function cleanName(n) {
  return n.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ').trim();
}
function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch { return ''; }
}
function thumbUrl(id)  { return `/api/archive/thumb/${id}`; }
function mediaUrl(id)  { return `/api/archive/media/${id}`; }
function isVideo(item) { return item.folder === 'video' || /\.(mp4|mov|webm|mkv|avi)$/i.test(item.name); }

/* ─── hero crossfade ───────────────────────────────────────────────────── */
let heroSlides = [];
let heroIdx = 0;
let heroTimer;

function buildHero(images) {
  const hero = document.getElementById('hero');
  const center = hero.querySelector('.hero-center');
  // pick up to 5 newest images
  const picks = images.slice(0, 5);
  if (!picks.length) return;
  picks.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'hero-slide' + (i === 0 ? ' active' : '');
    div.style.backgroundImage = `url(${thumbUrl(item.id)})`;
    hero.insertBefore(div, center);
    heroSlides.push(div);
  });
  // preload next
  if (picks.length > 1) preloadHeroNext(1);
  if (!reduced) heroTimer = setInterval(advanceHero, 5000);
}

function preloadHeroNext(idx) {
  if (!manifest.images[idx]) return;
  const img = new Image();
  img.src = thumbUrl(manifest.images[idx].id);
}

function advanceHero() {
  const prev = heroIdx;
  heroIdx = (heroIdx + 1) % heroSlides.length;
  heroSlides[prev].classList.remove('active');
  heroSlides[heroIdx].classList.add('active');
  // preload the one after next
  preloadHeroNext((heroIdx + 1) % heroSlides.length);
}

/* ─── manifest fetch ────────────────────────────────────────────────────── */
async function loadManifest() {
  try {
    const r = await fetch('/api/archive/manifest');
    manifest = await r.json();
  } catch {
    manifest = { images: [], videos: [] };
  }

  buildHero(manifest.images);
  renderVisual();
  renderMotion();

  // trigger stitch + tagline after a tick
  requestAnimationFrame(() => {
    document.querySelector('.stitch-line').classList.add('animate');
    setTimeout(() => document.getElementById('heroTagline').classList.add('visible'), reduced ? 0 : 1800);
  });
}

/* ─── grid builders ─────────────────────────────────────────────────────── */
function renderVisual() {
  let items = [...manifest.images];
  if (visualFilter === 'anime') items = items.filter(i => i.folder === 'anime');
  if (visualOrder === 'oldest') items = items.reverse();
  currentItems = items;
  renderGrid('gridVisual', 'msgVisual', items, 'visual');
}

function renderMotion() {
  let items = [...manifest.videos];
  if (motionOrder === 'oldest') items = items.reverse();
  currentItems = items; // will be overridden when pane is active
  renderGrid('gridMotion', 'msgMotion', items, 'motion');
}

function renderGrid(gridId, msgId, items, pane) {
  const grid = document.getElementById(gridId);
  const msg  = document.getElementById(msgId);
  // clear (except the msg placeholder)
  [...grid.children].forEach(c => { if (c !== msg) c.remove(); });

  if (!items.length) {
    msg.style.display = 'block';
    msg.textContent = 'No pieces in the archive yet.';
    return;
  }
  msg.style.display = 'none';

  items.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'grid-item';
    el.dataset.id = item.id;
    el.dataset.idx = idx;
    el.dataset.pane = pane;
    el.style.transitionDelay = reduced ? '0ms' : `${Math.min(idx * 60, 600)}ms`;

    if (isVideo(item)) {
      el.innerHTML = `
        <video src="${mediaUrl(item.id)}" muted loop playsinline preload="none"
               poster="${thumbUrl(item.id)}" aria-label="${cleanName(item.name)}"></video>
        <div class="item-caption">
          <span class="item-name">${cleanName(item.name)}</span>
          <span class="item-date">${fmtDate(item.date)}</span>
        </div>`;
      // IntersectionObserver autoplay
      setupVideoAutoplay(el.querySelector('video'));
    } else {
      el.innerHTML = `
        <img src="${thumbUrl(item.id)}" alt="${cleanName(item.name)}" loading="lazy">
        <div class="item-caption">
          <span class="item-name">${cleanName(item.name)}</span>
          <span class="item-date">${fmtDate(item.date)}</span>
        </div>`;
    }

    el.addEventListener('click', () => openLightbox(pane, idx));
    grid.appendChild(el);
  });

  // reveal on scroll
  setupReveal(grid);
}

/* ─── video autoplay (IntersectionObserver) ─────────────────────────────── */
const autoplayObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    const v = e.target;
    if (e.isIntersecting) { v.play().catch(() => {}); }
    else { v.pause(); }
  });
}, { threshold: .3 });

function setupVideoAutoplay(video) {
  autoplayObs.observe(video);
}

/* ─── scroll reveal ─────────────────────────────────────────────────────── */
const revealObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('revealed');
      revealObs.unobserve(e.target);
    }
  });
}, { threshold: .08 });

function setupReveal(grid) {
  grid.querySelectorAll('.grid-item').forEach(el => revealObs.observe(el));
}

/* ─── tabs ──────────────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-pill').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    document.querySelectorAll('.grid-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    const pane = btn.dataset.tab;
    document.getElementById('pane-' + pane).classList.add('active');
    currentItems = pane === 'visual' ? manifest.images : manifest.videos;
  });
});

/* ─── filter chips ──────────────────────────────────────────────────────── */
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    visualFilter = chip.dataset.filter;
    renderVisual();
  });
});

/* ─── sort ───────────────────────────────────────────────────────────────── */
document.getElementById('sortVisual').addEventListener('click', function() {
  visualOrder = visualOrder === 'newest' ? 'oldest' : 'newest';
  this.querySelector('span').textContent = visualOrder === 'newest' ? 'Newest' : 'Oldest';
  this.querySelector('svg').style.transform = visualOrder === 'oldest' ? 'rotate(180deg)' : '';
  renderVisual();
});
document.getElementById('sortMotion').addEventListener('click', function() {
  motionOrder = motionOrder === 'newest' ? 'oldest' : 'newest';
  this.querySelector('span').textContent = motionOrder === 'newest' ? 'Newest' : 'Oldest';
  this.querySelector('svg').style.transform = motionOrder === 'oldest' ? 'rotate(180deg)' : '';
  renderMotion();
});

/* ─── lightbox ───────────────────────────────────────────────────────────── */
const lbEl    = document.getElementById('lightbox');
const lbImg   = document.getElementById('lb-img');
const lbVid   = document.getElementById('lb-video');
const lbCtrl  = document.getElementById('lbControls');
const lbFill  = document.getElementById('lbFill');
const lbTime  = document.getElementById('lbTime');
const lbWrap  = document.getElementById('lbWrap');

function openLightbox(pane, idx) {
  const items = pane === 'visual' ? manifest.images : manifest.videos;
  currentItems = items;
  lbIndex = idx;

  // grab origin rect for animation
  const el = document.querySelector(`.grid-item[data-pane="${pane}"][data-idx="${idx}"]`);
  if (el && !reduced) {
    const r = el.getBoundingClientRect();
    lbWrap.style.setProperty('--lb-ox', ((r.left + r.width/2) / window.innerWidth * 100) + '%');
    lbWrap.style.setProperty('--lb-oy', ((r.top + r.height/2) / window.innerHeight * 100) + '%');
  }

  lbEl.classList.add('open');
  document.body.style.overflow = 'hidden';
  showLbItem(lbIndex);
}

function showLbItem(idx) {
  if (!currentItems.length) return;
  idx = ((idx % currentItems.length) + currentItems.length) % currentItems.length;
  lbIndex = idx;
  const item = currentItems[idx];

  // reset wrap animation
  lbWrap.style.animation = 'none';
  requestAnimationFrame(() => { lbWrap.style.animation = ''; });

  document.getElementById('lbName').textContent = cleanName(item.name);
  document.getElementById('lbDate').textContent = fmtDate(item.date);

  if (isVideo(item)) {
    lbImg.style.display = 'none';
    lbVid.style.display = 'block';
    lbCtrl.classList.add('video-active');
    lbVid.src = mediaUrl(item.id);
    lbVid.load();
    lbVid.play().catch(() => {});
  } else {
    lbVid.pause();
    lbVid.src = '';
    lbVid.style.display = 'none';
    lbCtrl.classList.remove('video-active');
    lbImg.style.display = 'block';
    // start loading immediately
    lbImg.src = thumbUrl(item.id);
    // then swap to full media once loaded
    const full = new Image();
    full.onload = () => { lbImg.src = mediaUrl(item.id); };
    full.src = mediaUrl(item.id);
  }
}

function closeLightbox() {
  lbEl.classList.remove('open');
  document.body.style.overflow = '';
  lbVid.pause();
  lbVid.src = '';
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
lbEl.addEventListener('click', e => { if (e.target === lbEl) closeLightbox(); });
document.getElementById('lb-prev').addEventListener('click', () => showLbItem(lbIndex - 1));
document.getElementById('lb-next').addEventListener('click', () => showLbItem(lbIndex + 1));

// keyboard
document.addEventListener('keydown', e => {
  if (!lbEl.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  showLbItem(lbIndex - 1);
  if (e.key === 'ArrowRight') showLbItem(lbIndex + 1);
});

// swipe
let swipeX = null;
lbEl.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive: true });
lbEl.addEventListener('touchend', e => {
  if (swipeX === null) return;
  const dx = e.changedTouches[0].clientX - swipeX;
  if (Math.abs(dx) > 40) showLbItem(lbIndex + (dx < 0 ? 1 : -1));
  swipeX = null;
});

/* video controls */
lbVid.addEventListener('timeupdate', () => {
  if (!lbVid.duration) return;
  const pct = (lbVid.currentTime / lbVid.duration) * 100;
  lbFill.style.width = pct + '%';
  const s = Math.floor(lbVid.currentTime);
  lbTime.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
});

const lbPlayIcon = document.getElementById('lbPlayIcon');
document.getElementById('lbPlay').addEventListener('click', () => {
  if (lbVid.paused) { lbVid.play(); }
  else { lbVid.pause(); }
});
lbVid.addEventListener('play',  () => {
  lbPlayIcon.innerHTML = '<rect x="4" y="3" width="4" height="14"/><rect x="12" y="3" width="4" height="14"/>';
});
lbVid.addEventListener('pause', () => {
  lbPlayIcon.innerHTML = '<polygon points="5,3 17,10 5,17"/>';
});

document.getElementById('lbScrubber').addEventListener('click', function(e) {
  const r = this.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  lbVid.currentTime = pct * lbVid.duration;
});

/* ─── gold thread scroll tracker ────────────────────────────────────────── */
const thread   = document.getElementById('thread');
const knot     = document.getElementById('thread-knot');
const progBar  = document.getElementById('progress-bar');
const sections = ['hero', 'archive', 'footer'];
let lastSection = '';

const sectionObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting && e.target.dataset.section !== lastSection) {
      lastSection = e.target.dataset.section;
      knot.classList.remove('pulse');
      requestAnimationFrame(() => knot.classList.add('pulse'));
    }
  });
}, { threshold: .2 });
document.querySelectorAll('[data-section]').forEach(s => sectionObs.observe(s));

window.addEventListener('scroll', () => {
  const scrolled = window.scrollY;
  const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
  const pct = maxScroll > 0 ? Math.min(scrolled / maxScroll, 1) : 0;

  // desktop thread
  thread.style.transform = `scaleY(${pct})`;
  knot.style.top = (pct * (window.innerHeight - 9)) + 'px';

  // mobile progress bar
  progBar.style.width = (pct * 100) + '%';
}, { passive: true });

/* ─── boot ───────────────────────────────────────────────────────────────── */
loadManifest();
</script>
</body>
