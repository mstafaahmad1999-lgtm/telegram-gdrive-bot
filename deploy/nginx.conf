server {
    listen 80;
    server_name dashboard.sovan.info;

    # Redirect HTTP to HTTPS (certbot will fill this in)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dashboard.sovan.info;

    # SSL — filled in by: sudo certbot --nginx -d dashboard.sovan.info
    ssl_certificate     /etc/letsencrypt/live/dashboard.sovan.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.sovan.info/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Pass to gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }
}
